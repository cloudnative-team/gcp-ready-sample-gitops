liferay-default:
    customEnv:
        x-port-forward-override:
            -   name: LIFERAY_WEB_PERIOD_SERVER_PERIOD_HOST
                value: localhost
            -   name: LIFERAY_WEB_PERIOD_SERVER_PERIOD_HTTP_PERIOD_PORT
                value: "8081"
    network:
        hostnames:
            -   lcd-51702-dev.example.com
            -   liferaydev.paastrial.xyz
    resources:
        limits:
            cpu: 2000m
            memory: 6Gi
        requests:
            cpu: 1000m
            memory: 2Gi
