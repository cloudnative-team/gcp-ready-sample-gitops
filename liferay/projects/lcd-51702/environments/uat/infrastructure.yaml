backup:
    retentionDays: 14
    schedule: 0 5 * * *
database:
    instanceType: db-custom-2-7680
    storageGB: 20
search:
    elasticsearch:
        nodeCount: 1
        podSecurityContext:
            runAsNonRoot: true
            seccompProfile:
                type: RuntimeDefault
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
                drop:
                    -   ALL
            runAsNonRoot: true
            seccompProfile:
                type: RuntimeDefault
        version: 8.19.11
        volumeSize: 20Gi
