backup:
    retentionDays: 7
    schedule: 0 5 * * *
database:
    instanceType: db-custom-1-3840
    storageGB: 10
search:
    elasticsearch:
        nodeCount: 1
        podSecurityContext:
            runAsNonRoot: true
            seccompProfile:
                type: RuntimeDefault
        securityContext:
            allowPrivilegeEscalation: false
            capabilities:
                drop:
                    -   ALL
            runAsNonRoot: true
            seccompProfile:
                type: RuntimeDefault
        version: 8.19.11
        volumeSize: 10Gi
