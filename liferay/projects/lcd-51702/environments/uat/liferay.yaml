liferay-default:
    customEnv:
        x-port-forward-override:
            -   name: LIFERAY_WEB_PERIOD_SERVER_PERIOD_HOST
                value: localhost
            -   name: LIFERAY_WEB_PERIOD_SERVER_PERIOD_HTTP_PERIOD_PORT
                value: "8082"
    network:
        hostnames:
            -   lcd-51702-uat.example.com
    resources:
        limits:
            cpu: 4000m
            memory: 12Gi
        requests:
            cpu: 2000m
            memory: 4Gi
